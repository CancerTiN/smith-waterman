<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smith-Waterman Demos</title>
<style>
  :root {
    --ink: #16110c;
    --muted: #6f6254;
    --paper: #f5efe4;
    --panel: #fffaf0;
    --rule: #2a2118;
    --accent: #b73525;
    --blue: #223e5c;
    --shadow: 0 24px 70px rgba(42, 33, 24, 0.16);
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    --serif: Georgia, "Times New Roman", serif;
    --sans: Avenir Next, Trebuchet MS, Verdana, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    min-height: 100vh;
    margin: 0;
    color: var(--ink);
    font-family: var(--sans);
    background:
      linear-gradient(120deg, rgba(183, 53, 37, 0.12), transparent 32%),
      linear-gradient(240deg, rgba(34, 62, 92, 0.14), transparent 38%),
      radial-gradient(circle at 22% 20%, rgba(198, 145, 44, 0.20), transparent 30%),
      var(--paper);
  }

  main {
    width: min(1040px, calc(100% - 32px));
    min-height: 100vh;
    margin: 0 auto;
    display: grid;
    align-content: center;
    gap: 28px;
    padding: 40px 0;
  }

  .kicker {
    margin: 0;
    color: var(--muted);
    font: 700 12px var(--mono);
    text-transform: uppercase;
  }

  h1 {
    max-width: 840px;
    margin: 0;
    font-family: var(--serif);
    font-size: 78px;
    line-height: 0.92;
    letter-spacing: 0;
  }

  .intro {
    max-width: 680px;
    margin: 0;
    color: var(--muted);
    font-size: 18px;
    line-height: 1.7;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .card {
    min-height: 220px;
    display: grid;
    gap: 14px;
    align-content: space-between;
    padding: 22px;
    color: inherit;
    text-decoration: none;
    border: 1px solid rgba(42, 33, 24, 0.28);
    background: rgba(255, 250, 240, 0.78);
    box-shadow: var(--shadow);
    transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: var(--rule);
    background: var(--panel);
  }

  .card small {
    color: var(--muted);
    font: 700 12px var(--mono);
    text-transform: uppercase;
  }

  .card b {
    font-family: var(--serif);
    font-size: 38px;
    line-height: 1;
  }

  .card span {
    color: var(--muted);
    line-height: 1.55;
  }

  .primary b { color: var(--accent); }
  .classic b { color: var(--blue); }

  @media (max-width: 760px) {
    main { width: min(100% - 22px, 1040px); }
    h1 { font-size: 48px; }
    .cards { grid-template-columns: 1fr; }
    .card { min-height: 170px; }
  }
</style>
</head>
<body>
  <main>
    <p class="kicker">Smith-Waterman demos</p>
    <h1>局部序列比对，也可以有舞台感。</h1>
    <p class="intro">
      选择经典单文件教学页，或进入 Claude Design 随机风格版本。
      两个入口都展示同一个 Smith-Waterman 动态规划过程。
    </p>

    <section class="cards" aria-label="Demo entrances">
      <a class="card primary" href="claude-design/">
        <small>Recommended</small>
        <b>随机风格演示</b>
        <span>每次进入会在论文版、终端调试器、编辑专题之间随机切换。</span>
      </a>
      <a class="card classic" href="classic.html">
        <small>Classic</small>
        <b>经典教学演示</b>
        <span>一个完整单文件 HTML，适合直接保存、分享和离线打开。</span>
      </a>
    </section>
  </main>
</body>
</html>
